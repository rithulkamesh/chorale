name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            test: ./build/dsp_tests
          - os: ubuntu-latest
            test: ./build/dsp_tests
          - os: windows-latest
            test: ./build/Release/dsp_tests.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxext-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libfreetype6-dev \
            libfontconfig1-dev libgl1-mesa-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: DSP tests
        run: ${{ matrix.test }}
